<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Detail</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #eee; padding: 40px; }
        .book-card { background: white; max-width: 700px; margin: 0 auto; display: flex; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .book-img { flex: 1; text-align: center; }
        .book-img img { width: 180px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        .book-info { flex: 2; padding-left: 20px; }
        h1 { margin-top: 0; color: #333; }
        .meta { color: #777; font-style: italic; margin-bottom: 10px; }
        .description { font-size: 0.95em; line-height: 1.5; color: #444; }
    </style>
</head>
<body>
    <a href="index.html">← Back to Home</a>
    <div class="book-card" id="book-content">
        <div class="book-img">
            <img id="cover" src="" alt="Book Cover">
        </div>
        <div class="book-info">
            <h1 id="title">Loading...</h1>
            <p class="meta">By <span id="author"></span> | <span id="pages"></span> Pages</p>
            <div id="description" class="description"></div>
            <p><strong>Published:</strong> <span id="date"></span></p>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            $.getJSON("google-books-book.json", function(data) {
                const info = data.volumeInfo;
                $("#title").text(info.title);
                $("#author").text(info.authors ? info.authors.join(", ") : "Unknown Author");
                $("#pages").text(info.pageCount);
                $("#date").text(info.publishedDate);
                $("#description").html(info.description);
                $("#cover").attr("src", info.imageLinks ? info.imageLinks.thumbnail : "https://via.placeholder.com/150");
            }).fail(function() {
                $("#title").text("Error loading book data.");
            });
        });
    </script>
</body>
</html>
