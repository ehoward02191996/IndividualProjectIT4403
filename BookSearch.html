<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; display: flex; gap: 15px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card img { width: 100px; height: 150px; object-fit: cover; }
        .card-info h3 { margin: 0; color: #2980b9; font-size: 1.1em; }
        .card-info p { font-size: 0.85em; color: #666; margin: 8px 0; }
    </style>
</head>
<body>
    <p><a href="index.html">← Back to Project Home</a></p>
    <h1>Book Search Results</h1>
    
    <div class="grid" id="search-grid">
        </div>

    <script>
        $(document).ready(function() {
            // Updated path to match your SearchBook.json file
            $.getJSON("SearchBook.json", function(data) {
                $.each(data.items, function(i, item) {
                    const info = item.volumeInfo;
                    const thumb = info.imageLinks ? info.imageLinks.thumbnail : "https://via.placeholder.com/100x150";
                    
                    const cardHtml = `
                        <div class="card">
                            <img src="${thumb}" alt="Book Cover">
                            <div class="card-info">
                                <h3>${info.title}</h3>
                                <p><strong>Author(s):</strong> ${info.authors ? info.authors.join(", ") : "N/A"}</p>
                                <p>${info.description ? info.description.substring(0, 120) + "..." : "No description available."}</p>
                            </div>
                        </div>
                    `;
                    $("#search-grid").append(cardHtml);
                });
            });
        });
    </script>
</body>
</html>
