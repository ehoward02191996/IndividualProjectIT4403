<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #fafafa; padding: 20px; }
        #results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .book-item { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 5px; display: flex; align-items: flex-start; }
        .book-item img { width: 80px; margin-right: 15px; }
        .book-item h3 { margin: 0 0 5px 0; font-size: 1.1em; color: #0056b3; }
        .book-item p { font-size: 0.85em; color: #555; margin: 5px 0; }
    </style>
</head>
<body>
    <a href="index.html">← Back to Home</a>
    <h1>Search Results</h1>
    <div id="results-grid">
        </div>

    <script>
        $(document).ready(function() {
            $.getJSON("google-books-search.json", function(data) {
                $.each(data.items, function(i, item) {
                    const info = item.volumeInfo;
                    const thumb = info.imageLinks ? info.imageLinks.smallThumbnail : "https://via.placeholder.com/80x120";
                    const authors = info.authors ? info.authors.join(", ") : "Unknown";
                    
                    const bookHTML = `
                        <div class="book-item">
                            <img src="${thumb}" alt="thumbnail">
                            <div>
                                <h3>${info.title}</h3>
                                <p><strong>Authors:</strong> ${authors}</p>
                                <p>${info.description ? info.description.substring(0, 100) + "..." : "No description available."}</p>
                            </div>
                        </div>
                    `;
                    $("#results-grid").append(bookHTML);
                });
            });
        });
    </script>
</body>
</html>
